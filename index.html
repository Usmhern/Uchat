<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UChat Pro</title>

<style>
:root{
--primary:#0084ff;
--received:#e4e6eb;
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
height:100dvh;
background:#111;
display:flex;
justify-content:center;
align-items:center;
font-family:system-ui;
}

.chat-container{
width:100%;
max-width:430px;
height:100dvh;
background:#fff;
display:flex;
flex-direction:column;
}

header{
background:var(--primary);
color:#fff;
padding:12px;
display:flex;
justify-content:space-between;
align-items:center;
}

.online-dot{
width:8px;height:8px;border-radius:50%;
background:red;margin-right:6px;
}

.online .online-dot{background:#42b72a}

.chat-box{
flex:1;
overflow-y:auto;
padding:10px;
display:flex;
flex-direction:column;
gap:10px;
background:#fafafa;
}

.msg{
max-width:75%;
padding:10px;
border-radius:12px;
font-size:14px;
position:relative;
}

.sent{
align-self:flex-end;
background:var(--primary);
color:#fff;
}

.received{
align-self:flex-start;
background:var(--received);
}

.time{
font-size:10px;
opacity:0.7;
margin-top:4px;
text-align:right;
}

.ticks{
font-size:10px;
margin-left:5px;
opacity:0.8;
}

.input-area{
padding:10px;
border-top:1px solid #ddd;
display:flex;
gap:5px;
background:#fff;
}

input{
flex:1;
padding:10px;
border-radius:20px;
border:1px solid #ddd;
}

button{
width:42px;
height:42px;
border-radius:50%;
border:none;
background:#eee;
}

.send{
background:#00a884;
color:#fff;
}

/* recording */
.recording{
background:red!important;
color:#fff;
}
</style>
</head>

<body>

<div class="chat-container">

<header>
<h3>UChat</h3>
<div style="display:flex;align-items:center">
<div class="online-dot"></div>
<span id="status">Live</span>
</div>
</header>

<div id="chat"></div>

<div class="input-area">
<input id="name" placeholder="Name">

<input id="msg" placeholder="Message">

<button id="recBtn">🎤</button>
<button class="send" onclick="sendMsg()">➤</button>
</div>

</div>

<script>
const URL = "YOUR_GOOGLE_SCRIPT_URL";

let lastCount = 0;
let mediaRecorder;
let audioChunks = [];

/* TIME */
function timeNow(){
const d=new Date();
let h=d.getHours();
let m=d.getMinutes();
const ampm=h>=12?"pm":"am";
h=h%12||12;
m=m<10?"0"+m:m;
return `${h}:${m}${ampm}`;
}

/* FETCH */
async function fetchData(){
try{
let res=await fetch(URL);
let data=await res.json();

render(data);

lastCount=data.length;
document.body.classList.add("online");
}catch{
document.body.classList.remove("online");
}
}

/* RENDER */
function render(data){
let me=name.value;

document.getElementById("chat").innerHTML=data.map(r=>{
let mine=r[0]===me;

let ticks = r[4]==="sent"?"✓":(r[4]==="seen"?"✓✓":"");

let audio = r[3]
? `<audio controls src="${r[3]}"></audio>`
:"";

return `
<div class="msg ${mine?'sent':'received'}">
<div>${r[1]||audio}</div>
${audio}
<div class="time">
${r[2]||""} <span class="ticks">${ticks}</span>
</div>
</div>`;
}).join('');
}

/* SEND TEXT */
async function sendMsg(audioData=""){
await fetch(URL,{
method:"POST",
mode:"no-cors",
body:JSON.stringify({
name:name.value,
message:msg.value,
time:timeNow(),
audio:audioData,
seen:"sent",
lastActive:Date.now()
})
});

msg.value="";
}

/* VOICE NOTE */
document.getElementById("recBtn").onclick=async()=>{

if(!mediaRecorder){

let stream=await navigator.mediaDevices.getUserMedia({audio:true});

mediaRecorder=new MediaRecorder(stream);

mediaRecorder.ondataavailable=e=>{
audioChunks.push(e.data);
};

mediaRecorder.onstop=()=>{
let blob=new Blob(audioChunks,{type:"audio/webm"});
let reader=new FileReader();

reader.onloadend=()=>{
sendMsg(reader.result);
};

reader.readAsDataURL(blob);
audioChunks=[];
};

mediaRecorder.start();

recBtn.classList.add("recording");

}else{
mediaRecorder.stop();
mediaRecorder=null;
recBtn.classList.remove("recording");
}
};

/* SEND BUTTON */
function sendMsg(audio=""){
sendMsgInternal(audio);
}

async function sendMsgInternal(audio=""){
await fetch(URL,{
method:"POST",
mode:"no-cors",
body:JSON.stringify({
name:name.value,
message:msg.value,
time:timeNow(),
audio:audio,
seen:"sent",
lastActive:Date.now()
})
});
msg.value="";
}

/* AUTO REFRESH */
setInterval(fetchData,1000);
fetchData();

/* UPDATE SEEN */
setInterval(async()=>{
await fetch(URL,{
method:"POST",
mode:"no-cors",
body:JSON.stringify({
seen:"seen",
name:name.value
})
});
},3000);
</script>

</body>
</html>
