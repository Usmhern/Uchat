<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UChat Fixed</title>

<style>
:root{
--primary:#036;
--received:#e4e6eb;
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
height:100dvh;
background:#111;
display:flex;
justify-content:center;
align-items:center;
font-family:system-ui;
}

.chat-container{
width:100%;
max-width:430px;
height:100dvh;
background:black;
display:flex;
}

/* USERS */
.sidebar{
width:120px;
background:#0f172a;
color:#fff;
padding:10px;
overflow-y:auto;
font-size:12px;
}

.user{
padding:8px;
border-bottom:1px solid #222;
cursor:pointer;
display:flex;
justify-content:space-between;
align-items:center;
}

/* CHAT */
.chat-main{
flex:1;
display:flex;
flex-direction:column;
}

header{
background:var(--primary);
color:#fff;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

.status-dot{
width:10px;
height:10px;
border-radius:50%;
background:red;
}

.status-dot.online{
background:#25D366;
}

/* CHAT BOX */
.chat-box{
flex:1;
overflow-y:auto;
padding:12px;
display:flex;
flex-direction:column;
gap:10px;
background:#fafafa;
}

.msg{
max-width:75%;
padding:10px;
border-radius:15px;
font-size:14px;
word-break:break-word;
}

.sent{align-self:flex-end;background:#052;color:#fff;}
.received{align-self:flex-start;background:var(--received);}

.time{
font-size:10px;
opacity:0.7;
margin-top:4px;
display:flex;
justify-content:flex-end;
gap:5px;
}

/* INPUT */
.input-area{
padding:10px;
background:#fff;
display:flex;
gap:5px;
}

input{
flex:1;
padding:10px;
border-radius:20px;
border:1px solid #ccc;
outline:none;
}

button{
width:40px;
height:40px;
border-radius:50%;
border:none;
background:#036;
color:#fff;
}

/* POPUP */
.popup{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
background:#036;
color:#fff;
padding:10px 15px;
border-radius:10px;
font-size:13px;
}
</style>
</head>

<body>

<div class="chat-container">

<!-- USERS -->
<div class="sidebar">
<h4 style="color:#0bf;margin-bottom:10px;">USERS</h4>
<div id="users"></div>
</div>

<!-- CHAT -->
<div class="chat-main">

<header>
<h3 id="chatTitle">UChat</h3>
<span id="status" class="status-dot"></span>
</header>

<div id="chatBox" class="chat-box"></div>

<form id="form" class="input-area">
<input id="msg" placeholder="Message..." required>
<button type="submit">➤</button>
</form>

</div>
</div>

<script>
const URL="https://script.google.com/macros/s/AKfycbwnsg8sCprc57e1QwLuW9IqYkWcnMrPT5pmuisE1OCEJ9jFwYNv-dLikIoiDwt83MXKTg/exec";

let user="";
let active=null;
let messages=[];
let users=[];
let lastCount=0;

const msgInput=document.getElementById("msg");

/* LOGIN + REGISTER */
window.onload=async()=>{
user = prompt("Enter username:");
if(!user) user="User"+Math.floor(Math.random()*9999);

await registerUser();
load();
setInterval(load, 2000);
};

/* REGISTER USER */
async function registerUser(){
try{
await fetch(URL,{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
type:"register",
name:user,
time:new Date().toISOString()
})
});
}catch(err){
console.log("Register error:",err);
}
}

/* LOAD DATA */
async function load(){
try{
const res = await fetch(URL + "?t=" + Date.now());
const data = await res.json();

messages = data.messages || [];
users = data.users || [];

renderUsers();
renderMessages();
notify();

document.getElementById("status").classList.add("online");

}catch(err){
console.log("Load error:",err);
document.getElementById("status").classList.remove("online");
}
}

/* USERS */
function renderUsers(){
let html="";

users.forEach(u=>{
let name="",time="";

if(Array.isArray(u)){
name=u[0];
time=u[1];
}else{
name=u;
}

if(!name) return;

html+=`
<div class="user" onclick="openChat('${name}')">
<span>${name}</span>
<span class="status-dot online"></span>
</div>`;
});

document.getElementById("users").innerHTML=
html || "<p style='color:#aaa'>No users</p>";
}

/* OPEN CHAT */
function openChat(u){
active=u;
document.getElementById("chatTitle").innerText=u;
}

/* MESSAGES */
function renderMessages(){
const box=document.getElementById("chatBox");

if(!active){
box.innerHTML="<center style='padding:20px'>Select user</center>";
return;
}

const chat = messages.filter(m=>
(m[0]==user && m[1]==active) ||
(m[0]==active && m[1]==user)
);

box.innerHTML = chat.map(m=>{
const mine = m[0] === user;

return `
<div class="msg ${mine?'sent':'received'}">
<div>${m[2]}</div>
<div class="time">
${new Date(m[3]).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'})}
</div>
</div>`;
}).join("");

box.scrollTop = box.scrollHeight;
}

/* SEND MESSAGE */
document.getElementById("form").onsubmit = async(e)=>{
e.preventDefault();

if(!active) return alert("Select a user");

try{
await fetch(URL,{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
type:"message",
sender:user,
receiver:active,
message:msgInput.value,
time:new Date().toISOString()
})
});

msgInput.value="";

}catch(err){
alert("Message failed");
console.log(err);
}
};

/* NOTIFY */
function notify(){
if(messages.length > lastCount){
const last = messages[messages.length-1];

if(last && last[1] === user){
popup(last[0], last[2]);
}

lastCount = messages.length;
}
}

function popup(sender,msg){
const div=document.createElement("div");
div.className="popup";
div.innerText=`📩 ${sender}: ${msg}`;
document.body.appendChild(div);

setTimeout(()=>div.remove(),3000);
}
</script>

</body>
</html>
