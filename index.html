<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UChat</title>

<style>
:root{
--primary:#036;
--received:#e4e6eb;
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
height:100dvh;
background:#111;
display:flex;
justify-content:center;
align-items:center;
font-family:system-ui;
}

.chat-container{
width:100%;
max-width:430px;
height:100dvh;
background:black;
display:flex;
}

/* USERS */
.sidebar{
width:120px;
background:#0f172a;
color:#fff;
padding:10px;
overflow-y:auto;
font-size:12px;
}

.user{
padding:8px;
border-bottom:1px solid #222;
cursor:pointer;
display:flex;
justify-content:space-between;
align-items:center;
}

/* CHAT */
.chat-main{
flex:1;
display:flex;
flex-direction:column;
}

header{
background:var(--primary);
color:#fff;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

/* DOT */
.status-dot{
width:10px;
height:10px;
border-radius:50%;
background:red;
display:inline-block;
}

.status-dot.online{
background:#25D366;
animation:blink 1s infinite;
box-shadow:0 0 8px #25D366;
}

@keyframes blink{
50%{opacity:0.3;}
}

/* CHAT BOX */
.chat-box{
flex:1;
overflow-y:auto;
padding:12px;
display:flex;
flex-direction:column;
gap:10px;
background:#fafafa;
}

.msg{
max-width:75%;
padding:10px;
border-radius:15px 0 15px 0;
font-size:14px;
word-break:break-word;
}

.sent{align-self:flex-end;background:#052;color:#fff;}
.received{align-self:flex-start;background:var(--received);}

.time{
font-size:10px;
opacity:0.7;
margin-top:4px;
display:flex;
justify-content:flex-end;
gap:5px;
}

/* INPUT */
.input-area{
padding:10px;
background:#fff;
display:flex;
gap:5px;
}

input{
flex:1;
padding:10px;
border-radius:20px;
border:1px solid #ccc;
outline:none;
}

button{
width:40px;
height:40px;
border-radius:50%;
border:none;
background:#036;
color:#fff;
}

/* USERS HEADER */
.user-header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:6px;
}

.toggle-btn{
width:28px;
height:28px;
border-radius:50%;
background:#036;
color:#fff;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
font-size:18px;
user-select:none;
}

/* POPUP */
.popup{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
background:#036;
color:#fff;
padding:10px 15px;
border-radius:10px;
font-size:13px;
}

/* VOICE */
.voice-btn{
background:#ddd;
color:#000;
}

.voice-recording{
background:red !important;
color:#fff !important;
animation:blink 0.8s infinite;
}
</style>
</head>

<body>

<div class="chat-container">

<!-- USERS -->
<div class="sidebar">

<div class="user-header">
<h4 style="color:#0bf">USERS</h4>
<div class="toggle-btn" onclick="toggleUsers()" id="toggleBtn">+</div>
</div>

<div id="users"></div>

</div>

<!-- CHAT -->
<div class="chat-main">

<header>
<h3 id="chatTitle">UChat</h3>
<span id="globalStatus" class="status-dot"></span>
</header>

<div id="chatBox" class="chat-box"></div>

<form id="form" class="input-area">
<input id="msg" placeholder="Message..." required>
<button type="button" class="voice-btn">🎤</button>
<button type="submit">➤</button>
</form>

</div>
</div>


<script>
const URL="https://script.google.com/macros/s/AKfycbyYCUdPsi0Ck5Rb90bM0SDfzwpziPZ_whuptr2WxJuHAKfXmPZ2QGVCP32Vs9LXe5HCFw/exec";

let user="";
let active=null;
let messages=[];
let users=[];
let showAll=true;
let lastCount=0;

/* INPUT */
const msgInput = document.getElementById("msg");

/* LOGIN + REGISTER USER */
window.onload=async()=>{
user = prompt("Enter username:");
if(!user) user="User"+Math.floor(Math.random()*9999);

await registerUser();
};

/* REGISTER USER TO BACKEND */
async function registerUser(){
try{
await fetch(URL,{
method:"POST",
body:JSON.stringify({
type:"register",
name:user,
time:new Date().toISOString()
})
});
}catch(e){
console.log("Register failed",e);
}
}

/* TOGGLE USERS */
function toggleUsers(){
showAll=!showAll;
document.getElementById("toggleBtn").innerText=showAll?"–":"+";
}

/* MAIN LOOP */
async function load(){
try{
const res=await fetch(URL+"?t="+Date.now());
const data=await res.json();

messages = Array.isArray(data.messages) ? data.messages : [];
users = Array.isArray(data.users) ? data.users : [];

renderUsers();
renderMessages();
handleNotify();

document.getElementById("globalStatus").classList.add("online");

}catch(e){
console.log(e);
document.getElementById("globalStatus").classList.remove("online");
}
}

/* USERS */
function renderUsers(){
const now=Date.now();
let html="";

users.forEach(u=>{
let name="",lastSeen="";

if(Array.isArray(u)){
name=u[0];
lastSeen=u[1];
}else if(typeof u==="string"){
name=u;
}

if(!name) return;

let online=false;
const t=new Date(lastSeen).getTime();
if(!isNaN(t)){
online=(now-t)<15000;
}

if(!showAll && !online) return;

html+=`
<div class="user" onclick="openChat('${name}')">
<span>• ${name}</span>
<span class="status-dot ${online?'online':''}"></span>
</div>`;
});

document.getElementById("users").innerHTML=
html || "<div style='padding:10px;color:#aaa'>No users</div>";
}

/* OPEN CHAT */
function openChat(u){
active=u;
document.getElementById("chatTitle").innerText=u;
}

/* MESSAGES */
function renderMessages(){

const box=document.getElementById("chatBox");

if(!active){
box.innerHTML="<center style='padding:20px'>Select user</center>";
return;
}

const chat=messages.filter(m=>
(m[0]==user&&m[1]==active)||
(m[0]==active&&m[1]==user)
);

box.innerHTML=chat.map(m=>{
const mine=m[0]===user;
const seen=m[4];

return `
<div class="msg ${mine?'sent':'received'}">
<div>${m[2]}</div>
<div class="time">
${new Date(m[3]).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}
${mine?(seen?'✓✓':'✓'):''}
</div>
</div>`;
}).join('');

box.scrollTop=box.scrollHeight;
}

/* SEND MESSAGE */
document.getElementById("form").onsubmit=async(e)=>{
e.preventDefault();

if(!active) return alert("Select user");

await fetch(URL,{
method:"POST",
body:JSON.stringify({
type:"message",
sender:user,
receiver:active,
message:msgInput.value,
time:new Date().toISOString()
})
});

msgInput.value="";
};

/* VOICE */
let recognition;
let recording=false;

document.querySelector(".voice-btn").onclick=()=>{

if(!('webkitSpeechRecognition'in window||'SpeechRecognition'in window)){
alert("Not supported");
return;
}

const btn=document.querySelector(".voice-btn");

if(!recording){

btn.classList.add("voice-recording");
btn.innerHTML="⏹️";

recognition=new (window.SpeechRecognition||window.webkitSpeechRecognition)();
recognition.lang="en-US";
recognition.start();

recording=true;

recognition.onresult=(e)=>{
msgInput.value=e.results[0][0].transcript;
};

}else{

btn.classList.remove("voice-recording");
btn.innerHTML="🎤";

recognition.stop();
recording=false;
}
};

/* NOTIFICATIONS */
function handleNotify(){
if(messages.length>lastCount){

const last=messages[messages.length-1];

if(last && last[1]==user){
showPopup(last[0],last[2]);
}

lastCount=messages.length;
}
}

function showPopup(sender,msg){
const div=document.createElement("div");
div.className="popup";
div.innerText=`📩 ${sender}: ${msg}`;
document.body.appendChild(div);

setTimeout(()=>div.remove(),2500);

try{
new Audio("https://actions.google.com/sounds/v1/alarms/beep_short.ogg").play();
}catch(e){}
}

/* LOOP */
setInterval(load,1500);
load();
</script>

</body>
</html>
