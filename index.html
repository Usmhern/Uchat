<script>
const URL = "https://script.google.com/macros/s/AKfycbyYCUdPsi0Ck5Rb90bM0SDfzwpziPZ_whuptr2WxJuHAKfXmPZ2QGVCP32Vs9LXe5HCFw/exec";

let user = "";
let active = null;
let allMessages = [];
let lastCount = 0;

/* LOGIN */
window.onload = ()=>{
user = prompt("Enter username:");
if(!user) user = "User"+Math.floor(Math.random()*9999);
};

/* FETCH */
async function load(){
try{
const res = await fetch(URL);
const data = await res.json();

allMessages = data.messages || [];

renderUsers(data.users || []);
renderMessages();
handleNotifications(data.messages || []);

document.getElementById("status").innerText="Live";
document.getElementById("status").className="status-online";

}catch(e){
document.getElementById("status").innerText="Reconnecting...";
document.getElementById("status").className="status-offline";
}
}

/* ✅ FIXED USERS (NO CUT NAMES + GREEN/RED CIRCLE) */
function renderUsers(users){

const now = Date.now();

users = users.map(u=>{
if(Array.isArray(u)) return u;
return [u, null];
});

document.getElementById("users").innerHTML =
users.map(u=>{

const name = u[0];   // FIXED FULL NAME
const lastSeen = u[1];

let online = false;

if(lastSeen){
online = (now - new Date(lastSeen).getTime()) < 10000;
}

return `
<div class="user" onclick="openChat('${name}')">
<span style="color:#fff">• ${name}</span>
<span style="font-size:12px; color:${online?'#0f0':'red'}"> ●</span>
</div>`;
}).join('');
}

/* CHAT OPEN */
function openChat(u){
active = u;
document.getElementById("chatTitle").innerText = u;
renderMessages();
}

/* MESSAGES (RESTORED ✓ ✓✓) */
function renderMessages(){

if(!active){
chatBox.innerHTML = "<center>Select user</center>";
return;
}

const chatBox = document.getElementById("chatBox");

const msgs = allMessages.filter(m=>
(m[0]==user && m[1]==active) ||
(m[0]==active && m[1]==user)
);

chatBox.innerHTML = msgs.map(m=>{

const mine = m[0]===user;
const read = m[4];

return `
<div class="msg ${mine?'sent':'received'}">
<div>${m[2]}</div>

<div class="time">
${new Date(m[3]).toLocaleTimeString()}
${mine ? (read ? " ✓✓" : " ✓") : ""}
</div>
</div>`;
}).join('');

chatBox.scrollTop = chatBox.scrollHeight;
}

/* SEND */
document.getElementById("form").onsubmit = async(e)=>{
e.preventDefault();

if(!active) return alert("Select user");

await fetch(URL,{
method:"POST",
mode:"no-cors",
body:JSON.stringify({
type:"message",
sender:user,
receiver:active,
message:msg.value,
time:new Date().toISOString()
})
});

msg.value="";
};

/* NOTIFICATION FIX */
function handleNotifications(messages){

if(!Array.isArray(messages)) return;

if(messages.length > lastCount){
const last = messages[messages.length-1];

if(last && last[1] === user){
showPopup(last[0], last[2]);
}

lastCount = messages.length;
}
}

/* POPUP */
function showPopup(sender,msg){

const div = document.createElement("div");
div.style.position="fixed";
div.style.bottom="20px";
div.style.left="50%";
div.style.transform="translateX(-50%)";
div.style.background="#036";
div.style.color="#fff";
div.style.padding="10px";
div.style.borderRadius="10px";
div.style.zIndex="9999";

div.innerHTML=`📩 ${sender}: ${msg}`;
document.body.appendChild(div);

setTimeout(()=>div.remove(),3000);

try{
const audio = new Audio("https://actions.google.com/sounds/v1/alarms/beep_short.ogg");
audio.play();
}catch(e){}
}

/* PRESENCE */
setInterval(()=>{
fetch(URL,{
method:"POST",
mode:"no-cors",
body:JSON.stringify({
type:"presence",
name:user
})
});
},5000);

/* LOOP */
setInterval(load,3000);
load();
</script>
