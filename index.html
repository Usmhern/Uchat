<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UChat</title>

<style>
:root{
--primary:#036;
--received:#e4e6eb;
--read:#00c853;
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
height:100dvh;
background:#111;
display:flex;
justify-content:center;
align-items:center;
font-family:system-ui;
}

.chat-container{
width:100%;
max-width:430px;
height:100dvh;
background:black;
display:flex;
}

.sidebar{
width:120px;
background:#0f172a;
color:#fff;
padding:10px;
overflow-y:auto;
font-size:12px;
}

.user{
padding:8px;
border-bottom:1px solid #222;
cursor:pointer;
}

.user:hover{
background:#1e293b;
}

.chat-main{
flex:1;
display:flex;
flex-direction:column;
}

header{
background:var(--primary);
color:#fff;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

.chat-box{
flex:1;
overflow-y:auto;
padding:12px;
display:flex;
flex-direction:column;
gap:10px;
background:#fafafa;
}

.msg{
max-width:75%;
padding:10px;
border-radius:15px 0px 15px 0px;
font-size:14px;
box-shadow:2px 0px 4px black;
}

.sent{align-self:flex-end;background:#052;color:#fff;}
.received{align-self:flex-start;background:var(--received);}

.time{
font-size:10px;
opacity:0.7;
margin-top:4px;
text-align:right;
}

.input-area{
padding:10px;
border-top:1px solid #ddd;
background:#fff;
}

.input-row{
display:flex;
gap:6px;
align-items:center;
}

input{
flex:1;
padding:10px;
border-radius:20px;
box-shadow:inset 0px 0px 2px black;
border:1px solid #ddd;
outline:none;
}

.send-btn{
width:40px;height:40px;
border-radius:50%;
background:#036;
border:none;
color:#fff;
}

.hidden{display:none;}
</style>
</head>

<body>

<div class="chat-container">

<div class="sidebar">
<h4 style="color:#0bf">USERS</h4>
<div id="users"></div>
</div>

<div class="chat-main">

<header>
<h3 id="chat-title">UChat</h3>
<span id="status">Connecting...</span>
</header>

<div id="chat-box" class="chat-box"></div>

<form id="form" class="input-area">
<input id="username" class="hidden">

<div class="input-row">
<input id="msg" placeholder="Message..." required>
<button type="submit" class="send-btn">➤</button>
</div>

</form>

</div>
</div>

<script>
const URL = "https://script.google.com/macros/s/AKfycbwzI4mCPxny_U_9ZQLTgI_SYXvKp0sA_vUMCdjKSgjci0iT7CdKTMiMh9NV7E-1K6gKmA/exec";

/* DOM */
const chatBox = document.getElementById("chat-box");
const usersBox = document.getElementById("users");
const status = document.getElementById("status");
const usernameInput = document.getElementById("username");
const msg = document.getElementById("msg");
const form = document.getElementById("form");
const chatTitle = document.getElementById("chat-title");

let currentUser = "";
let activeUser = null;
let allMessages = [];

/* LOGIN */
window.onload = () => {
let name="";
while(!name){
name = prompt("Enter your username:");
if(name) name = name.trim();
}

currentUser = name;
usernameInput.value = name;

/* register user */
fetch(URL,{
method:"POST",
mode:"no-cors",
body:JSON.stringify({name})
});
};

/* TIME */
function formatTime(t){
const d = new Date(t);
let h = d.getHours();
let m = d.getMinutes();
const ampm = h>=12?"pm":"am";
h = h%12 || 12;
m = m<10?"0"+m:m;
return `${h}:${m}${ampm}`;
}

/* FETCH */
async function fetchMessages(){
try{
const res = await fetch(URL);
const data = await res.json();

allMessages = data.messages || [];

renderUsers(data.users || []);
renderMessages();

status.innerText = "Online";

}catch{
status.innerText = "Reconnecting...";
}
}

/* USERS */
function renderUsers(users){
const filtered = users.filter(u=>u!==currentUser);

usersBox.innerHTML = filtered.map(u=>`
<div class="user" onclick="selectUser('${u}')">${u}</div>
`).join('');
}

/* SELECT CHAT */
function selectUser(u){
activeUser = u;
chatTitle.innerText = u;
renderMessages();
}

/* MESSAGES */
function renderMessages(){
if(!activeUser){
chatBox.innerHTML = "<center>Select a user</center>";
return;
}

const msgs = allMessages.filter(m=>{
return (
(m[0]===currentUser && m[1]===activeUser) ||
(m[0]===activeUser && m[1]===currentUser)
);
});

chatBox.innerHTML = msgs.map(r=>{
const mine = r[0]===currentUser;

return `
<div class="msg ${mine?'sent':'received'}">
<div>${r[2]}</div>
<div class="time">${formatTime(r[3])}</div>
</div>`;
}).join('');

chatBox.scrollTop = chatBox.scrollHeight;
}

/* SEND */
form.onsubmit = async(e)=>{
e.preventDefault();

if(!activeUser){
alert("Select a user first");
return;
}

await fetch(URL,{
method:"POST",
mode:"no-cors",
body:JSON.stringify({
type:"message",
sender:currentUser,
receiver:activeUser,
message:msg.value,
time:new Date().toISOString()
})
});

msg.value="";
};

/* AUTO REFRESH */
setInterval(fetchMessages,1000);
fetchMessages();
</script>

</body>
</html>
