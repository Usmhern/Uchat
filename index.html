<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UChat</title>

<style>
:root{
--primary:#036;
--received:#e4e6eb;
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
height:100dvh;
background:#111;
display:flex;
justify-content:center;
align-items:center;
font-family:system-ui;
}

.chat-container{
width:100%;
max-width:430px;
height:100dvh;
background:black;
display:flex;
}

.sidebar{
width:120px;
background:#0f172a;
color:#fff;
padding:10px;
overflow-y:auto;
font-size:12px;
}

.user{
padding:8px;
border-bottom:1px solid #222;
cursor:pointer;
}

.chat-main{
flex:1;
display:flex;
flex-direction:column;
}

header{
background:var(--primary);
color:#fff;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

.status-online{
color:#0f0;
font-size:12px;
}

.status-offline{
color:red;
font-size:12px;
}

.chat-box{
flex:1;
overflow-y:auto;
padding:12px;
display:flex;
flex-direction:column;
gap:10px;
background:#fafafa;
}

.msg{
max-width:75%;
padding:10px;
border-radius:12px;
font-size:14px;
}

.sent{align-self:flex-end;background:#052;color:#fff;}
.received{align-self:flex-start;background:var(--received);}

.time{
font-size:10px;
opacity:0.6;
margin-top:4px;
text-align:right;
}

.input-area{
padding:10px;
background:#fff;
display:flex;
gap:5px;
}

input{
flex:1;
padding:10px;
border-radius:20px;
border:1px solid #ccc;
}

button{
width:45px;
border:none;
background:#036;
color:#fff;
border-radius:50%;
}
</style>
</head>

<body>

<div class="chat-container">

<div class="sidebar">
<h4 style="color:#0bf">USERS</h4>
<div id="users"></div>
</div>

<div class="chat-main">

<header>
<h3 id="chatTitle">UChat</h3>
<span id="status">...</span>
</header>

<div id="chatBox" class="chat-box"></div>

<form id="form" class="input-area">
<input id="msg" placeholder="Message..." required>
<button>➤</button>
</form>

</div>
</div>

<script>
const URL = "https://script.google.com/macros/s/AKfycbyYCUdPsi0Ck5Rb90bM0SDfzwpziPZ_whuptr2WxJuHAKfXmPZ2QGVCP32Vs9LXe5HCFw/exec";

let user = "";
let active = null;
let allMessages = [];
let lastCount = 0;

/* LOGIN */
window.onload = ()=>{
user = prompt("Enter username:");
if(!user) user = "User"+Math.floor(Math.random()*1000);
};

/* FETCH */
async function load(){
try{
const res = await fetch(URL);
const data = await res.json();

allMessages = data.messages || [];

renderUsers(data.users || []);
renderMessages();

handleNotifications(data.messages);

document.getElementById("status").innerText="Online";
document.getElementById("status").className="status-online";

}catch(e){
document.getElementById("status").innerText="Reconnecting...";
document.getElementById("status").className="status-offline";
}
}

/* USERS */
function renderUsers(users){
users = users.filter(u=>u!==user);

document.getElementById("users").innerHTML =
users.map(u=>`
<div class="user" onclick="openChat('${u}')">${u}</div>
`).join('');
}

function openChat(u){
active = u;
document.getElementById("chatTitle").innerText = u;
renderMessages();
}

/* MESSAGES */
function renderMessages(){
if(!active){
chatBox.innerHTML = "<center>Select user</center>";
return;
}

const chatBox = document.getElementById("chatBox");

const msgs = allMessages.filter(m=>
(m[0]==user && m[1]==active) ||
(m[0]==active && m[1]==user)
);

chatBox.innerHTML = msgs.map(m=>{
const mine = m[0]===user;
return `
<div class="msg ${mine?'sent':'received'}">
<div>${m[2]}</div>
<div class="time">${new Date(m[3]).toLocaleTimeString()}</div>
</div>`;
}).join('');

chatBox.scrollTop = chatBox.scrollHeight;
}

/* SEND */
document.getElementById("form").onsubmit = async(e)=>{
e.preventDefault();

if(!active) return alert("Select user");

await fetch(URL,{
method:"POST",
mode:"no-cors",
body:JSON.stringify({
type:"message",
sender:user,
receiver:active,
message:msg.value,
time:new Date().toISOString()
})
});

msg.value="";
};

/* NOTIFICATION */
function handleNotifications(messages){
if(!messages) return;

if(messages.length > lastCount){
const last = messages[messages.length-1];

if(last[1] === user){
showPopup(last[0], last[2]);
}

lastCount = messages.length;
}
}

function showPopup(sender,msg){
const div = document.createElement("div");
div.style.position="fixed";
div.style.bottom="20px";
div.style.left="50%";
div.style.transform="translateX(-50%)";
div.style.background="#036";
div.style.color="#fff";
div.style.padding="10px";
div.style.borderRadius="10px";
div.innerText=`${sender}: ${msg}`;
document.body.appendChild(div);

setTimeout(()=>div.remove(),3000);
}

/* ONLINE STATUS PING */
setInterval(()=>{
fetch(URL,{
method:"POST",
mode:"no-cors",
body:JSON.stringify({type:"presence",name:user})
});
},5000);

/* LOOP */
setInterval(load,2000);
load();
</script>

</body>
</html>
