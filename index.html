<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UChat</title>

<style>
:root{
--primary:#0084ff;
--bg:#f0f2f5;
--received:#e4e6eb;
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
background:#000;
height:100dvh;
overflow:hidden;
font-family:system-ui;
}

/* FULL APP */
.chat-container{
height:100dvh;
width:100%;
max-width:450px;
margin:auto;
background:#fff;
display:flex;
flex-direction:column;
}

/* HEADER */
header{
background:var(--primary);
color:#fff;
padding:15px;
display:flex;
justify-content:space-between;
}

#status-dot{
width:8px;height:8px;border-radius:50%;
background:red;margin-right:6px;
}
.online #status-dot{background:#42b72a}

/* CHAT */
.chat-box{
flex:1;
overflow-y:auto;
padding:12px;
display:flex;
flex-direction:column;
gap:10px;
background:#fafafa;
}

/* MESSAGE */
.msg{
max-width:75%;
padding:10px 12px;
border-radius:14px;
font-size:14px;
}

.sent{
align-self:flex-end;
background:var(--primary);
color:#fff;
}

.received{
align-self:flex-start;
background:var(--received);
}

.msg-info{
font-size:10px;
opacity:0.6;
}

.time{
font-size:10px;
opacity:0.6;
margin-top:4px;
text-align:right;
}

/* INPUT */
.input-area{
padding:10px;
border-top:1px solid #ddd;
}

.input-row{
display:flex;
gap:5px;
}

input{
flex:1;
padding:10px;
border-radius:8px;
border:1px solid #ddd;
}

button{
background:var(--primary);
color:#fff;
border:none;
padding:10px;
border-radius:8px;
}

/* VOICE ACTIVE */
.listening{
background:red!important;
}
</style>
</head>

<body class="connecting">

<div class="chat-container">

<header>
<h3>UChat</h3>
<div id="status">
<span id="status-dot"></span>
<span id="status-text">Connecting...</span>
</div>
</header>

<div id="chat-box" class="chat-box"></div>

<form id="form" class="input-area">
<input id="username" placeholder="Username" required>

<div class="input-row">
<input id="msg" placeholder="Message..." required>
<button type="button" id="voiceBtn">🎤</button>
<button type="submit">Send</button>
</div>
</form>

</div>

<script>
const URL="https://script.google.com/macros/s/AKfycbwiUJSNMlDtSXF8LscIqMTTQBNVWhoNQ2Fzbfs2LX0EARD2inBRS1fsSbwiLXEozVBhzA/exec";

let lastCount=0;

/* TIME FORMAT */
function getTime(){
let d=new Date();
return d.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});
}

/* FETCH */
async function fetchMsg(){
try{
let res=await fetch(URL);
let data=await res.json();

if(data.length>lastCount){
render(data);
lastCount=data.length;
chatBox.scrollTop=chatBox.scrollHeight;
}

document.body.classList.add("online");
statusText.innerText="Live";

}catch{
document.body.classList.remove("online");
statusText.innerText="Reconnecting...";
}
}

/* RENDER */
function render(data){
let me=username.value;

chatBox.innerHTML=data.map(r=>{
let mine=r[0]===me;

return `
<div class="msg ${mine?'sent':'received'}">
<div class="msg-info">${r[0]}</div>
${r[1]}
<div class="time">${r[2] || ''}</div>
</div>`;
}).join('');
}

/* SEND */
form.onsubmit=async(e)=>{
e.preventDefault();

let time=getTime();

await fetch(URL,{
method:"POST",
mode:"no-cors",
body:JSON.stringify({
name:username.value,
message:msg.value,
time:time
})
});

msg.value="";
};

/* VOICE FIX */
let recognition;
const voiceBtn=document.getElementById("voiceBtn");

voiceBtn.addEventListener("click",async()=>{

if(!('webkitSpeechRecognition'in window || 'SpeechRecognition'in window)){
alert("Voice not supported");
return;
}

recognition=new (window.SpeechRecognition||window.webkitSpeechRecognition)();

recognition.lang="en-US";
recognition.interimResults=true;

voiceBtn.classList.add("listening");

recognition.start();

recognition.onresult=(e)=>{
let transcript="";
for(let i=0;i<e.results.length;i++){
transcript+=e.results[i][0].transcript;
}
msg.value=transcript;
};

recognition.onend=()=>{
voiceBtn.classList.remove("listening");
};

recognition.onerror=()=>{
voiceBtn.classList.remove("listening");
};

});

/* AUTO REFRESH */
setInterval(fetchMsg,1000);
fetchMsg();
</script>

</body>
</html>
