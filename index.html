<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UChat Pro</title>

<style>
:root {
    --primary:#0084ff;
    --bg:#f0f2f5;
    --dark:#1c1e21;
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
    background:linear-gradient(135deg,#0084ff,#00c6ff);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:system-ui;
}

/* Container */
.chat-container{
    width:100%;
    max-width:420px;
    height:95vh;
    background:#fff;
    border-radius:18px;
    display:flex;
    flex-direction:column;
    overflow:hidden;
    box-shadow:0 20px 50px rgba(0,0,0,0.2);
}

/* Header */
header{
    padding:15px;
    background:var(--primary);
    color:#fff;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

#status-dot{
    width:8px;height:8px;border-radius:50%;
    background:red;margin-right:6px;
}
.online #status-dot{background:lime}

/* Chat */
.chat-box{
    flex:1;
    overflow-y:auto;
    padding:15px;
    display:flex;
    flex-direction:column;
    gap:10px;
    background:#fafafa;
}

/* Messages */
.msg{
    max-width:75%;
    padding:10px 14px;
    border-radius:15px;
    font-size:14px;
    animation:fade 0.2s ease;
}

.sent{
    align-self:flex-end;
    background:var(--primary);
    color:#fff;
}

.received{
    align-self:flex-start;
    background:#e4e6eb;
}

.msg-info{
    font-size:10px;
    opacity:0.6;
}

/* Input */
.input-area{
    padding:10px;
    border-top:1px solid #eee;
    background:#fff;
}

.input-row{
    display:flex;
    gap:6px;
    margin-top:6px;
}

input{
    flex:1;
    padding:10px;
    border-radius:10px;
    border:1px solid #ddd;
}

/* Buttons */
button{
    border:none;
    background:var(--primary);
    color:#fff;
    padding:10px;
    border-radius:10px;
    cursor:pointer;
}

/* Emoji Picker */
#emoji-picker{
    position:absolute;
    bottom:80px;
    right:10px;
    width:250px;
    height:200px;
    overflow:auto;
    background:#fff;
    border-radius:10px;
    display:none;
    padding:10px;
    box-shadow:0 10px 20px rgba(0,0,0,0.2);
}

.emoji{
    cursor:pointer;
    font-size:20px;
    padding:5px;
}

/* Responsive */
@media(max-width:500px){
    .chat-container{
        height:100vh;
        border-radius:0;
    }
}

@keyframes fade{
    from{opacity:0;transform:translateY(10px);}
    to{opacity:1;transform:translateY(0);}
}
</style>
</head>

<body>

<div class="chat-container">
<header>
    <h3>UChat Pro</h3>
    <div id="status">
        <span id="status-dot"></span>
        <span id="status-text">Connecting...</span>
    </div>
</header>

<div id="chat-box" class="chat-box"></div>

<div id="emoji-picker"></div>

<form id="form" class="input-area">
<input id="username" placeholder="Username" required>

<div class="input-row">
    <button type="button" onclick="toggleEmoji()">😊</button>
    <input id="msg" placeholder="Message..." required>
    <button type="button" onclick="startVoice()">🎤</button>
    <button type="button" onclick="aiReply()">🤖</button>
    <button type="submit">➤</button>
</div>
</form>

</div>

<script>
const URL = "https://script.google.com/macros/s/AKfycbwiUJSNMlDtSXF8LscIqMTTQBNVWhoNQ2Fzbfs2LX0EARD2inBRS1fsSbwiLXEozVBhzA/exec";

const chat = document.getElementById("chat-box");
let lastCount = 0;

/* FETCH */
async function fetchMsg(){
    try{
        let res = await fetch(URL);
        let data = await res.json();

        if(data.length !== lastCount){
            render(data);
            lastCount = data.length;
            chat.scrollTop = chat.scrollHeight;
        }

        document.body.classList.add("online");
        document.getElementById("status-text").innerText="Live";
    }catch{
        document.getElementById("status-text").innerText="Offline";
    }
}

/* RENDER */
function render(data){
    let me = username.value;

    chat.innerHTML = data.map(r=>{
        let mine = r[0]===me;
        return `
        <div class="msg ${mine?'sent':'received'}">
            <div class="msg-info">${r[0]}</div>
            ${r[1]}
        </div>`;
    }).join('');
}

/* SEND */
form.onsubmit=async(e)=>{
    e.preventDefault();

    await fetch(URL,{
        method:"POST",
        mode:"no-cors",
        body:JSON.stringify({
            name:username.value,
            message:msg.value
        })
    });

    msg.value="";
};

/* EMOJI */
const emojis = "😀😁😂🤣😃😄😅😆😉😊😍😘😎😭😡👍🙏🔥🎉❤️".split("");

const picker = document.getElementById("emoji-picker");
picker.innerHTML = emojis.map(e=>`<span class="emoji">${e}</span>`).join("");

picker.onclick = e=>{
    if(e.target.classList.contains("emoji")){
        msg.value += e.target.innerText;
    }
};

function toggleEmoji(){
    picker.style.display = picker.style.display==="block"?"none":"block";
}

/* VOICE */
function startVoice(){
    const rec = new(window.SpeechRecognition||window.webkitSpeechRecognition)();
    rec.start();

    rec.onresult = e=>{
        msg.value += e.results[0][0].transcript;
    };
}

/* AI REPLY (Simple) */
function aiReply(){
    let text = msg.value.toLowerCase();

    if(text.includes("hi")) msg.value="Hello 👋";
    else if(text.includes("how are you")) msg.value="I'm fine 😊";
    else msg.value="Nice 👍";
}

/* AUTO REFRESH 1s */
setInterval(fetchMsg,1000);
fetchMsg();
</script>

</body>
</html>
