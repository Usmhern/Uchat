<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UChat</title>

<style>
:root {
    --primary:#0084ff;
    --bg:#f0f2f5;
    --text:#1c1e21;
    --received:#e4e6eb;
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
    background:linear-gradient(135deg,#0084ff,#00c6ff);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:system-ui;
}

/* Container */
.chat-container{
    width:100%;
    max-width:430px;
    height:95vh;
    background:#fff;
    border-radius:18px;
    display:flex;
    flex-direction:column;
    overflow:hidden;
    box-shadow:0 20px 40px rgba(0,0,0,0.2);
}

/* Header */
header{
    background:var(--primary);
    color:#fff;
    padding:15px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

header h2{
    font-size:18px;
    font-weight:600;
}

#status-container{
    display:flex;
    align-items:center;
    font-size:12px;
}

#status-dot{
    width:8px;height:8px;
    border-radius:50%;
    background:red;
    margin-right:6px;
}

.online #status-dot{background:#42b72a}

/* Chat */
.chat-box{
    flex:1;
    overflow-y:auto;
    padding:15px;
    display:flex;
    flex-direction:column;
    gap:10px;
    background:#fafafa;
}

/* Messages */
.msg{
    max-width:75%;
    padding:10px 14px;
    border-radius:16px;
    font-size:14px;
    animation:fade 0.2s ease;
}

.sent{
    align-self:flex-end;
    background:var(--primary);
    color:#fff;
    border-bottom-right-radius:4px;
}

.received{
    align-self:flex-start;
    background:var(--received);
    border-bottom-left-radius:4px;
}

.msg-info{
    font-size:10px;
    opacity:0.6;
    margin-bottom:2px;
}

/* Input */
.input-area{
    padding:10px;
    border-top:1px solid #eee;
    background:#fff;
}

.input-row{
    display:flex;
    gap:6px;
    margin-top:6px;
}

input{
    flex:1;
    padding:11px;
    border-radius:10px;
    border:1px solid #ddd;
    outline:none;
}

input:focus{
    border-color:var(--primary);
}

/* Buttons */
button{
    border:none;
    background:var(--primary);
    color:#fff;
    padding:10px 14px;
    border-radius:10px;
    cursor:pointer;
}

button:active{
    transform:scale(0.96);
}

/* Mobile */
@media(max-width:500px){
    .chat-container{
        height:100vh;
        border-radius:0;
    }
}

@keyframes fade{
    from{opacity:0;transform:translateY(10px);}
    to{opacity:1;transform:translateY(0);}
}
</style>
</head>

<body class="connecting">

<div class="chat-container">

<header>
    <h2>UChat</h2>
    <div id="status-container">
        <div id="status-dot"></div>
        <span id="status-text">Connecting...</span>
    </div>
</header>

<div id="chat-box" class="chat-box"></div>

<form id="form" class="input-area">
<input id="username" placeholder="Enter Username" required maxlength="15">

<div class="input-row">
    <input id="msg" placeholder="Type message..." required>
    <button type="button" id="voiceBtn">🎤</button>
    <button type="submit">Send</button>
</div>
</form>

</div>

<script>
const URL = "https://script.google.com/macros/s/AKfycbwiUJSNMlDtSXF8LscIqMTTQBNVWhoNQ2Fzbfs2LX0EARD2inBRS1fsSbwiLXEozVBhzA/exec";

const chatBox = document.getElementById("chat-box");
const statusText = document.getElementById("status-text");

let lastCount = 0;
let isFirstLoad = true;

/* FETCH MESSAGES */
async function fetchMessages(){
    try{
        const res = await fetch(URL);
        const data = await res.json();

        if(data.length > lastCount){
            render(data);
            lastCount = data.length;
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        document.body.classList.add("online");
        statusText.innerText = "Live";
        isFirstLoad = false;

    }catch(err){
        document.body.classList.remove("online");
        statusText.innerText = "Reconnecting...";
    }
}

/* RENDER */
function render(data){
    const me = username.value;

    chatBox.innerHTML = data.map(row=>{
        const mine = row[0] === me && me !== "";
        return `
        <div class="msg ${mine?'sent':'received'}">
            <div class="msg-info">${row[0]}</div>
            ${row[1]}
        </div>`;
    }).join('');
}

/* SEND */
form.onsubmit = async (e)=>{
    e.preventDefault();

    const name = username.value;
    const message = msg.value;

    if(!name || !message) return;

    username.readOnly = true;
    username.style.opacity = "0.6";

    msg.value = "";

    try{
        await fetch(URL,{
            method:"POST",
            mode:"no-cors",
            body:JSON.stringify({name,message})
        });

        setTimeout(fetchMessages,200);
    }catch{
        alert("Message failed.");
    }
};

/* VOICE (Improved) */
let recognition;
const voiceBtn = document.getElementById("voiceBtn");

voiceBtn.onclick = ()=>{
    if(!('webkitSpeechRecognition' in window || 'SpeechRecognition' in window)){
        alert("Voice not supported on this device");
        return;
    }

    recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
    recognition.lang = "en-US";
    recognition.interimResults = false;

    voiceBtn.innerText = "🎙️...";

    recognition.start();

    recognition.onresult = e=>{
        msg.value += e.results[0][0].transcript;
    };

    recognition.onend = ()=>{
        voiceBtn.innerText = "🎤";
    };

    recognition.onerror = ()=>{
        voiceBtn.innerText = "🎤";
    };
};

/* AUTO REFRESH */
setInterval(fetchMessages,1000);
fetchMessages();
</script>

</body>
</html>
