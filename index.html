<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UChat</title>

<style>
:root{
--primary:#0084ff;
--received:#e4e6eb;
--read:#00c853;
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
height:100dvh;
background:#111;
display:flex;
justify-content:center;
align-items:center;
font-family:system-ui;
}

.chat-container{
width:100%;
max-width:430px;
height:100dvh;
background:black;
display:flex;
}

.sidebar{
width:120px;
background:#0f172a;
color:#fff;
padding:10px;
overflow-y:auto;
font-size:12px;
}

.user{
padding:5px;
border-bottom:1px solid #222;
}

.chat-main{
flex:1;
display:flex;
flex-direction:column;
}

header{
background:var(--primary);
color:#fff;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

#status-container{
display:flex;
align-items:center;
font-size:12px;
}

#status-dot{
width:8px;height:8px;
border-radius:50%;
background:red;
margin-right:6px;
}

.online #status-dot{background:#42b72a}

.chat-box{
flex:1;
overflow-y:auto;
padding:12px;
display:flex;
flex-direction:column;
gap:10px;
background:#fafafa;
}

.msg{
max-width:75%;
padding:10px;
border-radius:50px 0px 50px 0px;
font-size:14px;
}

.sent{align-self:flex-end;background:#00a884;color:#fff;}
.received{align-self:flex-start;background:var(--received);}

.msg-info{font-size:10px;opacity:0.6;margin-bottom:2px;}

.time{
font-size:10px;
opacity:0.7;
margin-top:4px;
text-align:right;
}

.read{font-size:11px;margin-left:6px;color:#cfd8dc;}
.read.seen{color:#fff;}

.typing{
font-size:12px;
font-style:italic;
color:#666;
padding:6px 10px;
height:18px;
}

.input-area{
padding:10px;
border-top:1px solid #ddd;
background:#fff;
}

.input-row{
display:flex;
gap:6px;
align-items:center;
}

input{
flex:1;
padding:10px;
border-radius:20px;
border:1px solid #ddd;
outline:none;
}

.send-btn{
width:42px;height:42px;
border-radius:50%;
background:#00a884;
border:none;
color:#fff;
}

.voice-btn{
width:42px;height:42px;
border-radius:50%;
background:#eee;
border:none;
}

.voice-active{background:red !important;color:#fff;}

.hidden{display:none;}
</style>
</head>

<body>

<div class="chat-container">

<div class="sidebar">
<h4>Online</h4>
<div id="users"></div>
</div>

<div class="chat-main">

<header>
<h3>UChat</h3>
<div id="status-container">
<div id="status-dot"></div>
<span id="status-text">Connecting...</span>
</div>
</header>

<div id="chat-box" class="chat-box"></div>
<div id="typing" class="typing"></div>

<form id="form" class="input-area">

<!-- hidden username input -->
<input id="username" class="hidden">

<div class="input-row">
<input id="msg" placeholder="Message..." required>
<button type="button" id="voiceBtn" class="voice-btn">🎤</button>
<button type="submit" class="send-btn">➤</button>
</div>

</form>

</div>
</div>

<script>
const URL = "https://script.google.com/macros/s/AKfycbwzI4mCPxny_U_9ZQLTgI_SYXvKp0sA_vUMCdjKSgjci0iT7CdKTMiMh9NV7E-1K6gKmA/exec";

/* DOM FIX */
const chatBox = document.getElementById("chat-box");
const usersBox = document.getElementById("users");
const typingBox = document.getElementById("typing");
const statusText = document.getElementById("status-text");
const username = document.getElementById("username");
const msg = document.getElementById("msg");
const form = document.getElementById("form");
const voiceBtn = document.getElementById("voiceBtn");

let lastCount = 0;
let lockedUsername = null;

/* ✅ ASK USERNAME ON LOAD */
window.onload = () => {
let name = "";

while(!name){
name = prompt("Enter your username:");
if(name) name = name.trim();
}

lockedUsername = name;
username.value = name;
};

/* TIME */
function formatTime(t){
if(!t) return "";
const d = new Date(t);

let h = d.getHours();
let m = d.getMinutes();
const ampm = h >= 12 ? "pm" : "am";

h = h % 12 || 12;
m = m < 10 ? "0" + m : m;

return `${h}:${m}${ampm}`;
}

/* FETCH */
async function fetchMessages(){
try{
const res = await fetch(URL);
const data = await res.json();

if(data.messages && data.messages.length > lastCount){
renderMessages(data.messages);
lastCount = data.messages.length;
chatBox.scrollTop = chatBox.scrollHeight;
}

if(data.users) renderUsers(data.users);
if(data.typing) renderTyping(data.typing);

document.body.classList.add("online");
statusText.innerText = "Live";

}catch(e){
document.body.classList.remove("online");
statusText.innerText = "Reconnecting...";
}
}

/* MESSAGES */
function renderMessages(messages){
chatBox.innerHTML = messages.map(r=>{
const mine = r[0] === lockedUsername;
const read = r[3];

return `
<div class="msg ${mine?'sent':'received'}">
<div class="msg-info">${r[0]}</div>
<div>${r[1]}</div>
<div class="time">
${formatTime(r[2])}
<span class="read ${read?'seen':''}">
${mine ? (read ? '✓✓' : '✓') : ''}
</span>
</div>
</div>`;
}).join('');
}

/* USERS */
function renderUsers(users){
usersBox.innerHTML = users.map(u=>`<div class="user">${u}</div>`).join('');
}

/* TYPING */
function renderTyping(list){
const filtered = list.filter(u => u !== lockedUsername);

typingBox.innerText =
filtered.length === 0 ? "" :
filtered.length === 1 ? `${filtered[0]} is typing...` :
`${filtered.join(", ")} are typing...`;
}

/* SEND */
form.onsubmit = async (e)=>{
e.preventDefault();

await fetch(URL,{
method:"POST",
mode:"no-cors",
body:JSON.stringify({
type:"message",
name:lockedUsername,
message:msg.value,
time:formatTime(new Date())
})
});

msg.value="";
};

/* TYPING */
let typingTimeout;

msg.addEventListener("input",()=>{
clearTimeout(typingTimeout);

fetch(URL,{
method:"POST",
mode:"no-cors",
body:JSON.stringify({
type:"typing",
name:lockedUsername
})
});

typingTimeout=setTimeout(()=>{
fetch(URL,{
method:"POST",
mode:"no-cors",
body:JSON.stringify({
type:"typing-stop",
name:lockedUsername
})
});
},1500);
});

/* PRESENCE */
setInterval(()=>{
fetch(URL,{
method:"POST",
mode:"no-cors",
body:JSON.stringify({
type:"presence",
name:lockedUsername
})
});

fetch(URL,{
method:"POST",
mode:"no-cors",
body:JSON.stringify({
type:"read",
name:lockedUsername
})
});

},5000);

/* VOICE */
let recognition;
let isListening=false;

voiceBtn.onclick=()=>{
if(!('webkitSpeechRecognition'in window||'SpeechRecognition'in window)){
alert("Not supported");
return;
}

if(!isListening){
recognition=new (window.SpeechRecognition||window.webkitSpeechRecognition)();
recognition.lang="en-US";
recognition.start();
isListening=true;

voiceBtn.classList.add("voice-active");
voiceBtn.innerText="⏹";

recognition.onresult=(e)=>{
let t="";
for(let i=0;i<e.results.length;i++){
t+=e.results[i][0].transcript;
}
msg.value=t;
};

}else{
recognition.stop();
isListening=false;
voiceBtn.classList.remove("voice-active");
voiceBtn.innerText="🎤";
}
};

/* AUTO REFRESH */
setInterval(fetchMessages,1000);
fetchMessages();

</script>

</body>
</html>
