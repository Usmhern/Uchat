<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UChat</title>

<style>
:root{
--primary:#036;
--received:#e4e6eb;
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
height:100dvh;
background:#111;
display:flex;
justify-content:center;
align-items:center;
font-family:system-ui;
}

.chat-container{
width:100%;
max-width:430px;
height:100dvh;
background:black;
display:flex;
}

/* USERS */
.sidebar{
width:120px;
background:#0f172a;
color:#fff;
padding:10px;
overflow-y:auto;
font-size:12px;
}

.user{
padding:8px;
border-bottom:1px solid #222;
cursor:pointer;
display:flex;
justify-content:space-between;
white-space:nowrap;
overflow:hidden;
text-overflow:ellipsis;
}

/* CHAT */
.chat-main{
flex:1;
display:flex;
flex-direction:column;
}

header{
background:var(--primary);
color:#fff;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

/* STATUS DOT */
.status-dot{
width:10px;
height:10px;
border-radius:50%;
background:red;
display:inline-block;
}
.online-blink{
background:#25D366;
box-shadow:0 0 8px #25D366;
animation:blink 1s infinite;
}
@keyframes blink{
50%{opacity:0.4;}
}

/* CHAT BOX */
.chat-box{
flex:1;
overflow-y:auto;
padding:12px;
display:flex;
flex-direction:column;
gap:10px;
background:#fafafa;
}

.msg{
max-width:75%;
padding:10px;
border-radius:15px 0 15px 0;
font-size:14px;
word-break:break-word;
}

.sent{align-self:flex-end;background:#052;color:#fff;}
.received{align-self:flex-start;background:var(--received);}

.time{
font-size:10px;
opacity:0.7;
margin-top:4px;
display:flex;
justify-content:flex-end;
gap:5px;
}

/* INPUT */
.input-area{
padding:10px;
background:#fff;
display:flex;
gap:5px;
}

input{
flex:1;
padding:10px;
border-radius:20px;
border:1px solid #ccc;
outline:none;
}

/* BUTTONS */
button{
width:40px;
height:40px;
border-radius:50%;
border:none;
background:#036;
color:#fff;
}

.voice-btn{
background:#ddd;
color:#000;
display:flex;
align-items:center;
justify-content:center;
font-size:16px;
}

.voice-recording{
background:red !important;
color:#fff !important;
animation:blink 0.8s infinite;
}

/* POPUP */
.popup{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
background:#036;
color:#fff;
padding:10px 15px;
border-radius:10px;
font-size:13px;
z-index:9999;
}

/* TYPING */
#typingBox{
font-size:12px;
color:#555;
padding:5px 10px;
}
</style>
</head>

<body>

<div class="chat-container">

<!-- USERS -->
<div class="sidebar">
<h4 style="color:#0bf">USERS</h4>
<div id="users"></div>
</div>

<!-- CHAT -->
<div class="chat-main">

<header>
<h3 id="chatTitle">UChat</h3>
<span id="globalStatus" class="status-dot"></span>
</header>

<div id="typingBox"></div>
<div id="chatBox" class="chat-box"></div>

<form id="form" class="input-area">
<input id="msg" placeholder="Message..." required>

<button type="button" class="voice-btn">🎤</button>
<button type="submit">➤</button>
</form>

</div>
</div>

<script>
const URL="https://script.google.com/macros/s/AKfycbyYCUdPsi0Ck5Rb90bM0SDfzwpziPZ_whuptr2WxJuHAKfXmPZ2QGVCP32Vs9LXe5HCFw/exec";

let user="";
let active=null;
let allMessages=[];
let lastCount=0;

/* LOGIN */
window.onload=()=>{
user=prompt("Enter username:");
if(!user) user="User"+Math.floor(Math.random()*9999);
};

/* LOAD */
async function load(){
try{
const res=await fetch(URL);
const data=await res.json();

allMessages=data.messages||[];

renderUsers(data.users||[]);
renderMessages();
renderTyping(data.typing||[]);
handleNotifications(data.messages||[]);

const dot=document.getElementById("globalStatus");
dot.style.background="#25D366";
dot.classList.add("online-blink");

}catch(e){
const dot=document.getElementById("globalStatus");
dot.style.background="red";
dot.classList.remove("online-blink");
}
}

/* USERS */
function renderUsers(users){

const now=Date.now();

users=users.map(u=>{
if(Array.isArray(u)) return u;
return [u,""];
});

document.getElementById("users").innerHTML=
users.map(u=>{

const name=u[0];
const lastSeen=u[1];

let online=false;

if(lastSeen){
const t=new Date(lastSeen).getTime();
online=(now-t)<30000;
}

return `
<div class="user" onclick="openChat('${name}',${online})">
<span>• ${name}</span>
<span style="color:${online?'#25D366':'red'}">
${online?'online':'offline'}
</span>
</div>`;
}).join('');
}

/* OPEN CHAT */
let selectedOnline=false;

function openChat(u,online){
active=u;
selectedOnline=online;
document.getElementById("chatTitle")=
document.getElementById("chatTitle").innerText=u+(online?" 🟢":" 🔴");
}

/* MESSAGES */
function renderMessages(){

const chatBox=document.getElementById("chatBox");

if(!active){
chatBox.innerHTML="<center style='padding:20px'>Select user</center>";
return;
}

const msgs=allMessages.filter(m=>
(m[0]==user&&m[1]==active)||
(m[0]==active&&m[1]==user)
);

chatBox.innerHTML=msgs.map(m=>{

const mine=m[0]===user;
const read=m[4];

return `
<div class="msg ${mine?'sent':'received'}">
<div>${m[2]}</div>
<div class="time">
${new Date(m[3]).toLocaleTimeString()}
${mine?(read?'✓✓':'✓'):''}
</div>
</div>`;
}).join('');

chatBox.scrollTop=chatBox.scrollHeight;
}

/* SEND */
document.getElementById("form").onsubmit=async(e)=>{
e.preventDefault();

if(!active)return alert("Select user");

await fetch(URL,{
method:"POST",
mode:"no-cors",
body:JSON.stringify({
type:"message",
sender:user,
receiver:active,
message:msg.value,
time:new Date().toISOString()
})
});

msg.value="";
};

/* TYPING */
let typingTimeout;

msg.addEventListener("input",()=>{

fetch(URL,{
method:"POST",
mode:"no-cors",
body:JSON.stringify({
type:"typing",
name:user
})
});

clearTimeout(typingTimeout);

typingTimeout=setTimeout(()=>{

fetch(URL,{
method:"POST",
mode:"no-cors",
body:JSON.stringify({
type:"typing-stop",
name:user
})
});

},1200);

});

/* TYPING DISPLAY */
function renderTyping(list){

const box=document.getElementById("typingBox");

if(!Array.isArray(list))return;

const typing=list.filter(x=>x[1]===true).map(x=>x[0]);

const filtered=typing.filter(x=>x!==user);

box.innerText=filtered.length?`${filtered.join(", ")} is typing...`:"";
}

/* NOTIFICATION */
function handleNotifications(messages){

if(!Array.isArray(messages))return;

if(messages.length>lastCount){
const last=messages[messages.length-1];

if(last&&last[1]===user){
showPopup(last[0],last[2]);
}

lastCount=messages.length;
}
}

/* POPUP */
function showPopup(sender,msg){

const div=document.createElement("div");
div.className="popup";
div.innerHTML=`📩 ${sender}: ${msg}`;
document.body.appendChild(div);

setTimeout(()=>div.remove(),3000);

try{
new Audio("https://actions.google.com/sounds/v1/alarms/beep_short.ogg").play();
}catch(e){}
}

/* VOICE BUTTON */
let recognition;
let recording=false;

document.querySelector(".voice-btn").onclick=()=>{

if(!('webkitSpeechRecognition'in window||'SpeechRecognition'in window)){
alert("Not supported");
return;
}

const btn=document.querySelector(".voice-btn");

if(!recording){

btn.classList.add("voice-recording");
btn.innerHTML="⏹️";

recognition=new (window.SpeechRecognition||window.webkitSpeechRecognition)();
recognition.lang="en-US";
recognition.start();

recording=true;

recognition.onresult=(e)=>{
msg.value=e.results[0][0].transcript;
};

}else{

btn.classList.remove("voice-recording");
btn.innerHTML="🎤";

recognition.stop();
recording=false;
}
};

/* PRESENCE */
setInterval(()=>{
fetch(URL,{
method:"POST",
mode:"no-cors",
body:JSON.stringify({
type:"presence",
name:user
})
});
},3000);

/* LOOP */
setInterval(load,3000);
load();
</script>

</body>
</html>
