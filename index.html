<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UChat</title>

<style>
:root{
--primary:#0084ff;
--received:#e4e6eb;
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
height:100dvh;
background:#111;
display:flex;
justify-content:center;
align-items:center;
font-family:system-ui;
}

.chat-container{
width:100%;
max-width:430px;
height:100dvh;
background:#fff;
display:flex;
flex-direction:column;
}

header{
background:var(--primary);
color:#fff;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

#status-container{
display:flex;
align-items:center;
font-size:12px;
}

#status-dot{
width:8px;height:8px;
border-radius:50%;
background:red;
margin-right:6px;
}

.online #status-dot{background:#42b72a}

.chat-box{
flex:1;
overflow-y:auto;
padding:12px;
display:flex;
flex-direction:column;
gap:10px;
background:#fafafa;
}

.msg{
max-width:75%;
padding:10px 12px;
border-radius:14px;
font-size:14px;
}

.sent{
align-self:flex-end;
background:var(--primary);
color:#fff;
border-bottom-right-radius:4px;
}

.received{
align-self:flex-start;
background:var(--received);
border-bottom-left-radius:4px;
}

.msg-info{
font-size:10px;
opacity:0.6;
}

.time{
font-size:10px;
opacity:0.6;
margin-top:4px;
text-align:right;
}

.input-area{
padding:10px;
border-top:1px solid #ddd;
background:#fff;
}

.input-row{
display:flex;
gap:6px;
align-items:center;
}

input{
flex:1;
padding:10px;
border-radius:20px;
border:1px solid #ddd;
outline:none;
}

.send-btn{
width:42px;
height:42px;
border-radius:50%;
background:#00a884;
display:flex;
justify-content:center;
align-items:center;
color:#fff;
font-size:18px;
border:none;
}

.voice-btn{
width:42px;
height:42px;
border-radius:50%;
background:#eee;
border:none;
font-size:18px;
}

.voice-active{
background:red !important;
color:#fff;
}
</style>
</head>

<body class="connecting">

<div class="chat-container">

<header>
<h3>UChat</h3>
<div id="status-container">
<div id="status-dot"></div>
<span id="status-text">Connecting...</span>
</div>
</header>

<div id="chat-box" class="chat-box"></div>

<form id="form" class="input-area">
<input id="username" placeholder="Username" required maxlength="15">

<div class="input-row">
<input id="msg" placeholder="Message..." required>

<button type="button" id="voiceBtn" class="voice-btn">🎤</button>

<button type="submit" class="send-btn">➤</button>
</div>
</form>

</div>

<script>
const URL = "https://script.google.com/macros/s/AKfycbwiUJSNMlDtSXF8LscIqMTTQBNVWhoNQ2Fzbfs2LX0EARD2inBRS1fsSbwiLXEozVBhzA/exec";

const chatBox = document.getElementById("chat-box");
const statusText = document.getElementById("status-text");

let lastCount = 0;

/* TIME */
function getTime(){
    const d = new Date();
    let h = d.getHours();
    let m = d.getMinutes();

    h = h % 12 || 12;
    m = m < 10 ? "0" + m : m;

    const ampm = d.getHours() >= 12 ? "PM" : "AM";

    return `${h}:${m} ${ampm}`;
}

/* FETCH */
async function fetchMessages(){
try{
const res = await fetch(URL);
const data = await res.json();

if(data.length > lastCount){
render(data);
lastCount = data.length;
chatBox.scrollTop = chatBox.scrollHeight;
}

document.body.classList.add("online");
statusText.innerText = "Live";

}catch(e){
document.body.classList.remove("online");
statusText.innerText = "Reconnecting...";
}
}

/* RENDER */
function render(data){
const me = username.value;

chatBox.innerHTML = data.map(row=>{
const mine = row[0] === me;

return `
<div class="msg ${mine?'sent':'received'}">
<div class="msg-info">${row[0]}</div>
${row[1]}
<div class="time">${row[2] || ''}</div>
</div>`;
}).join('');
}

/* SEND */
form.onsubmit = async (e)=>{
e.preventDefault();

await fetch(URL,{
method:"POST",
mode:"no-cors",
body:JSON.stringify({
name:username.value,
message:msg.value,
time:getTime()
})
});

msg.value="";
};

/* VOICE (FIXED) */
let recognition;
let isListening = false;

const voiceBtn = document.getElementById("voiceBtn");

voiceBtn.onclick = () => {

    if (!('webkitSpeechRecognition' in window || 'SpeechRecognition' in window)) {
        alert("Voice not supported on this device");
        return;
    }

    if (!isListening) {
        recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();

        recognition.lang = "en-US";
        recognition.continuous = true;
        recognition.interimResults = true;

        recognition.start();
        isListening = true;

        voiceBtn.classList.add("voice-active");
        voiceBtn.innerText = "⏹";

        recognition.onresult = (e) => {
            let transcript = "";
            for (let i = 0; i < e.results.length; i++) {
                transcript += e.results[i][0].transcript;
            }
            msg.value = transcript;
        };

        recognition.onend = () => {
            if (isListening) recognition.start();
        };

        recognition.onerror = () => {
            stopVoice();
        };

    } else {
        stopVoice();
    }
};

function stopVoice() {
    if (recognition) recognition.stop();
    isListening = false;
    voiceBtn.classList.remove("voice-active");
    voiceBtn.innerText = "🎤";
}

/* AUTO REFRESH */
setInterval(fetchMessages,1000);
fetchMessages();
</script>

</body>
</html>
